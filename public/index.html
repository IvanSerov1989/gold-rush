<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Maze: Golden Rush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
    <h1>Golden Rush</h1>
      <div id="join-screen">
          <input type="text" id="username-input" placeholder="Enter username" maxlength="15">
          <button id="join-btn">Join</button>
          <p id="error-message" style="color: #ff6b6b; display: none;"></p>
      </div>
      <div id="lobby-screen" style="display: none;">
          <h2>Lobby (<span id="players-count">0</span>/4)</h2>
          <ul id="players-list"></ul>
          <button id="start-game-btn" style="display: none;">Start Game</button>
          <p id="waiting-message">Waiting for leader to start...</p>
      </div>

      <div id="game-wrapper" style="display: none; flex-direction: row; gap: 16px; align-items: flex-start; justify-content: center;">
          
          <!-- Game field -->
          <div id="game-board">
              <div id="hud">
                  <div id="timer">03:00</div>
              </div>
              <div id="pause-overlay" style="display: none;">
                <div class="pause-text">PAUSED</div>
              </div>
              <div id="game-over-screen" style="display: none;">
                  <div class="game-over-box">
                      <h2>Game Over</h2>
                      <p id="winner-text">Winner: —</p>
                      <button id="restart-btn">Return to Lobby</button>
                  </div>
              </div>
              <div id="in-game-menu" class="menu-overlay" style="display: none;">
                  <div class="menu-box">
                      <h2>Game Menu</h2>
                      <p id="menu-status">Game paused</p>
                      <button id="menu-resume-btn">Resume</button>
                      <button id="menu-leave-btn">Return to Lobby</button>
                      <p class="menu-hint">Press Esc to open/close</p>
                  </div>
              </div>
              <div id="notification-toast" class="notification-toast" style="display: none;"></div>
          </div>

          <!-- RIGHT COLUMN: LEADERBOARD + CHAT -->
          <div id="right-panel">
              <!-- Leaderboard -->
              <div id="leaderboard-sidebar">
                  <div class="leaderboard-header">
                      <h3>Leaderboard</h3>
                      <div class="player-count-badge"><span id="sidebar-player-count">0</span>/4</div>
                  </div>
                  <ul id="score-list"></ul>
                  <div class="leaderboard-footer">
                      <small>Collect gold and power-ups!</small>
                  </div>
              </div>

              <!-- Chat under leaderboard -->
              <div id="chat-panel">
                  <div id="chat-messages"></div>
                  <div id="chat-input-area">
                      <input type="text" id="chat-input" placeholder="Type a message..." maxlength="80">
                      <button id="chat-send-btn">Send</button>
                  </div>
              </div>
          </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
