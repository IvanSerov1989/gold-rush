<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арена-Лабиринт: Золотая Лихорадка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
      <h1>Золотая Лихорадка</h1>

      <div id="join-screen">
          <input type="text" id="username-input" placeholder="Введите никнейм" maxlength="15">
          <button id="join-btn">Присоединиться</button>
          <p id="error-message" style="color: #ff6b6b; display: none;"></p>
      </div>

      <div id="lobby-screen" style="display: none;">
          <h2>Лобби ожидания (<span id="players-count">0</span>/4)</h2>
          <ul id="players-list"></ul>
          <button id="start-game-btn" style="display: none;">Начать игру</button>
          <p id="waiting-message">Ожидаем лидера для старта...</p>
      </div>

      <div id="game-board" style="display: none;">
          <div id="hud">
              <div id="timer" class="hud-card">Время: <span>00:00</span></div>
              <div id="leaderboard" class="hud-card">
                  <h3>Таблица</h3>
                  <ul id="score-list"></ul>
              </div>
          </div>
          <div id="game-over-screen" style="display: none;">
              <div class="game-over-box">
                  <h2>Игра окончена</h2>
                  <p id="winner-text">Победитель: —</p>
                  <button id="restart-btn">Вернуться в лобби</button>
              </div>
          </div>
          <div id="in-game-menu" class="menu-overlay" style="display: none;">
              <div class="menu-box">
                  <h2>Меню игры</h2>
                  <p id="menu-status">Игра приостановлена</p>
                  <button id="menu-resume-btn">Продолжить</button>
                  <button id="menu-leave-btn">Выйти в лобби</button>
                  <p class="menu-hint">Нажмите Esc для открытия/закрытия</p>
              </div>
          </div>
          <div id="notification-toast" class="notification-toast" style="display: none;"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
